<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whip Simulator Pro</title>
    <style>
        :root {
            --blue: #00a2ff; --green: #44ff44; --red: #ff4444; --gold: #ffd700;
            --ui-bg: rgba(0, 0, 0, 0.6);
        }
        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none;
        }

        /* TOP RIGHT: Currencies */
        #currency-hud {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
        }
        .currency-box {
            background: var(--ui-bg); padding: 8px 15px; border-radius: 50px;
            border: 3px solid white; display: flex; align-items: center; gap: 10px; min-width: 120px;
        }
        .currency-box img { width: 30px; height: 30px; }
        .currency-box span { font-size: 20px; text-shadow: 2px 2px #000; }

        /* LEFT SIDE: Menu Buttons */
        #sidebar {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .menu-btn {
            width: 65px; height: 65px; background: var(--ui-bg); border: 4px solid white;
            border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.1s;
        }
        .menu-btn:active { transform: scale(0.9); }
        .menu-btn img { width: 80%; height: 80%; object-fit: contain; }

        /* BOTTOM LEFT: Energy & Boosts */
        #status-hud {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .energy-container { width: 200px; height: 30px; background: #333; border: 3px solid white; border-radius: 10px; overflow: hidden; position: relative; }
        #energy-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #44ff44, #ccff00); transition: 0.3s; }
        .energy-text { position: absolute; width: 100%; text-align: center; top: 2px; font-size: 14px; color: white; text-shadow: 1px 1px #000; }

        #boost-tray { display: flex; gap: 10px; }
        .boost-icon {
            width: 50px; height: 50px; background: rgba(0,255,0,0.2); border: 2px solid var(--green);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px;
        }

        /* STAGE */
        #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .target { pointer-events: auto; cursor: crosshair; }
        .target img { max-width: 70vw; max-height: 60vh; border: 5px solid white; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<div id="currency-hud">
    <div class="currency-box">
        <img src="Coin.png" alt="Coins">
        <span id="gold-txt">0</span>
    </div>
    <div class="currency-box" style="border-color: var(--blue);">
        <img src="Gem.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3209/3209944.png'" alt="Gems">
        <span id="gem-txt">0</span>
    </div>
</div>

<div id="sidebar">
    <div class="menu-btn" style="background: var(--red);"><img src="Shop.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3594/3594363.png'"></div>
    <div class="menu-btn" style="background: #ffaa00;"><img src="Pets.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616408.png'"></div>
    <div class="menu-btn" style="background: var(--blue);"><img src="Settings.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3953/3953226.png'"></div>
</div>

<div id="status-hud">
    <div class="energy-container">
        <div id="energy-bar"></div>
        <div class="energy-text">ENERGY: <span id="en-val">100</span>%</div>
    </div>
    <div id="boost-tray">
        <div class="boost-icon" id="boost-x2"><div>X2 💰</div><div id="timer-x2">05:00</div></div>
    </div>
</div>

<div id="stage">
    <div class="target" id="t-box" style="display:none">
        <img id="t-img" src="">
    </div>
    <input type="file" id="f" hidden accept="image/*">
    <button id="upload-btn" onclick="document.getElementById('f').click()" style="pointer-events:auto; padding:20px; border-radius:10px; font-weight:bold;">UPLOAD TARGET IMAGE</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let state = { gold: 0, gems: 0, energy: 100, isBoosted: true };
    let mouse = { x: -100, y: -100 };
    let points = [];
    let segments = 35;

    // Load your Whip Asset
    const whipHandleImg = new Image();
    whipHandleImg.src = 'IMG_8807.png';

    for(let i=0; i<segments; i++) points.push({x:0, y:0, oldX:0, oldY:0});

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();

    // Physics Engine
    function solve() {
        points[0].x = mouse.x; points[0].y = mouse.y;
        for(let i=1; i<segments; i++) {
            let p = points[i];
            let vx = (p.x - p.oldX) * 0.82;
            let vy = (p.y - p.oldY) * 0.82;
            p.oldX = p.x; p.oldY = p.y;
            p.x += vx; p.y += vy + 0.8;
            for(let j=0; j<5; j++) {
                let prev = points[i-1];
                let dx = p.x - prev.x, dy = p.y - prev.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let diff = (8 - dist) / dist;
                p.x += dx * diff; p.y += dy * diff;
            }
        }
    }

    function render() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        solve();

        // Draw Whip
        ctx.lineJoin = "round"; ctx.lineCap = "round";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for(let i=1; i<segments; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();

        // Draw Handle from your IMG_8807.png
        ctx.save();
        ctx.translate(points[0].x, points[0].y);
        let angle = Math.atan2(points[5].y - points[0].y, points[5].x - points[0].x);
        ctx.rotate(angle);
        ctx.drawImage(whipHandleImg, -10, -10, 60, 20); // Adjust size as needed
        ctx.restore();

        requestAnimationFrame(render);
    }
    render();

    // Interaction Logic
    const handleHit = (e) => {
        if(state.energy <= 0) return;

        const img = document.getElementById('t-img');
        const rect = img.getBoundingClientRect();
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;

        if(x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
            // Mechanics
            state.gold += state.isBoosted ? 20 : 10;
            state.energy -= 2;
            
            // UI Updates
            document.getElementById('gold-txt').innerText = state.gold;
            document.getElementById('en-val').innerText = Math.max(0, state.energy);
            document.getElementById('energy-bar').style.width = state.energy + "%";
            
            // Animation
            document.getElementById('t-box').style.transform = "scale(0.9) rotate(5deg)";
            setTimeout(()=> document.getElementById('t-box').style.transform="scale(1)", 50);
        }
    };

    // Auto Recharge Energy
    setInterval(() => {
        if(state.energy < 100) {
            state.energy = Math.min(100, state.energy + 1);
            document.getElementById('en-val').innerText = state.energy;
            document.getElementById('energy-bar').style.width = state.energy + "%";
        }
    }, 1000);

    // Setup
    window.addEventListener('mousedown', handleHit);
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    document.getElementById('f').onchange = (e) => {
        document.getElementById('t-img').src = URL.createObjectURL(e.target.files[0]);
        document.getElementById('t-box').style.display = 'block';
        document.getElementById('upload-btn').style.display = 'none';
    };
</script>
</body>
</html>
