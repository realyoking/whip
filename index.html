<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whip Sim Elite v8</title>
    <style>
        :root {
            /* Default: Light Theme */
            --bg: #f0f0f2; --surface: rgba(0, 0, 0, 0.05);
            --text: #111; --accent: #000; --panel: blur(25px);
        }
        [data-theme="dark"] {
            --bg: #050505; --surface: rgba(255, 255, 255, 0.05);
            --text: #fff; --accent: #fff;
        }
        [data-theme="keith"] {
            --bg: #1a1612; --surface: rgba(139, 69, 19, 0.1);
            --text: #d2b48c; --accent: #8b4513;
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; touch-action: none; transition: 0.4s ease;
        }

        /* Responsive Glass UI */
        #control-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: var(--surface); backdrop-filter: var(--panel);
            border: 1px solid rgba(0,0,0,0.1); border-radius: 20px;
            padding: 15px; width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .combo-badge { color: #ff3e3e; }

        select, button { 
            width: 100%; background: var(--surface); color: var(--text); 
            border: 1px solid var(--text); padding: 10px; 
            border-radius: 10px; margin-top: 5px; cursor: pointer; font-weight: 600;
        }

        /* Centering Fix */
        #stage { 
            width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden;
        }

        .target-box { 
            display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: transform 0.05s;
        }
        
        .target-box img { 
            max-width: 85vw; max-height: 65vh; 
            border-radius: 15px; border: 3px solid var(--accent); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            object-fit: contain;
        }

        /* Iframe Portal */
        #portal {
            position: fixed; inset: 0; z-index: 5000; display: none; background: #000;
        }

        .hit-bubble {
            position: absolute; pointer-events: none; z-index: 2000;
            background: #ffec00; color: #000; padding: 8px 16px;
            font-weight: 900; font-size: 24px; border: 3px solid #000;
            clip-path: polygon(0% 0%, 100% 0%, 85% 50%, 100% 100%, 0% 100%);
            animation: hitPop 0.3s forwards;
        }

        @keyframes hitPop { 
            0% { transform: scale(0.5); } 
            100% { transform: scale(1.2) translateY(-80px); opacity: 0; } 
        }

        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body data-theme="light">

<div id="control-panel">
    <div class="stat-row">
        <span>Master v8</span>
        <span class="combo-badge" id="combo-text">Combo x0</span>
    </div>
    <select id="themeSwitch">
        <option value="light">Pure Light</option>
        <option value="dark">Onyx Dark</option>
        <option value="keith">Keith Industrial</option>
    </select>
    <select id="whipSwitch">
        <option value="leather">Leather</option>
        <option value="chain">Chain</option>
        <option value="plasma">Plasma</option>
    </select>
    <button onclick="document.getElementById('f').click()">Upload Target</button>
    <input type="file" id="f" hidden accept="image/*">
</div>

<div id="portal">
    <button style="position:absolute;top:10px;right:10px;width:auto;z-index:5001" onclick="closePortal()">CLOSE</button>
    <iframe id="p-frame" src="" style="width:100%;height:100%;border:none;"></iframe>
</div>

<div id="stage">
    <div id="t-box" class="target-box" style="display:none">
        <img id="t-img" src="">
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const comboText = document.getElementById('combo-text');
    const portal = document.getElementById('portal');
    const pFrame = document.getElementById('p-frame');
    const tBox = document.getElementById('t-box');
    const tImg = document.getElementById('t-img');

    let mouse = { x: -100, y: -100 };
    let points = [];
    let segments = 45;
    let combo = 0;
    let lastHit = 0;

    const urls = [
        "https://geekprank.com/hacker/",
        "https://en.wikipedia.org/wiki/Whip",
        "https://cornhub.website/"
    ];

    const actions = ["Enough!", "STOP!", "PAW!", "MASTER!", "HELPP!"];

    for(let i=0; i<segments; i++) points.push({x:0, y:0, oldX:0, oldY:0});

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();

    document.getElementById('themeSwitch').onchange = (e) => document.body.setAttribute('data-theme', e.target.value);
    function closePortal() { portal.style.display = 'none'; pFrame.src = ""; combo = 0; comboText.innerText = "Combo x0"; }

    document.getElementById('f').onchange = (e) => {
        const url = URL.createObjectURL(e.target.files[0]);
        tImg.src = url;
        tBox.style.display = 'flex';
    };

    const input = (e) => {
        mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
        mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
    };
    window.addEventListener('mousemove', input);
    window.addEventListener('touchmove', (e) => { input(e); e.preventDefault(); }, {passive:false});

    function solve() {
        points[0].x = mouse.x; points[0].y = mouse.y;
        for(let i=1; i<segments; i++) {
            let p = points[i];
            let vx = (p.x - p.oldX) * 0.88;
            let vy = (p.y - p.oldY) * 0.88;
            p.oldX = p.x; p.oldY = p.y;
            p.x += vx; p.y += vy + 0.5;
            for(let j=0; j<4; j++) {
                let prev = points[i-1];
                let dx = p.x - prev.x, dy = p.y - prev.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let diff = (9 - dist) / dist;
                p.x += dx * diff; p.y += dy * diff;
            }
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        solve();
        let mode = document.getElementById('whipSwitch').value;
        const color = getComputedStyle(document.body).getPropertyValue('--accent');
        
        ctx.lineJoin = "round"; ctx.lineCap = "round";
        for(let i=0; i<segments-1; i++) {
            ctx.beginPath();
            ctx.moveTo(points[i].x, points[i].y);
            ctx.lineTo(points[i+1].x, points[i+1].y);
            if(mode === 'chain') {
                ctx.strokeStyle = i % 2 === 0 ? "#888" : "#444";
                ctx.lineWidth = 10;
            } else if(mode === 'plasma') {
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
                ctx.shadowBlur = 10; ctx.shadowColor = "#0ff";
            } else {
                ctx.strokeStyle = color;
                ctx.lineWidth = Math.max(2, 14 - (i * 0.3));
                ctx.shadowBlur = 0;
            }
            ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    draw();

    const hit = (e) => {
        if(tBox.style.display === 'none') return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const r = tImg.getBoundingClientRect();

        if(x > r.left && x < r.right && y > r.top && y < r.bottom) {
            const now = Date.now();
            // Faster cooldown: 300ms window to keep the combo going
            combo = (now - lastHit < 300) ? combo + 1 : 1;
            lastHit = now;
            comboText.innerText = "Combo x" + combo;

            if(combo >= 10) {
                pFrame.src = urls[Math.floor(Math.random()*urls.length)];
                portal.style.display = 'block';
            }

            tBox.style.transform = `scale(0.9) rotate(${(Math.random()-0.5)*15}deg)`;
            setTimeout(()=> tBox.style.transform = "scale(1)", 50);

            const b = document.createElement('div');
            b.className = 'hit-bubble';
            b.innerText = actions[Math.floor(Math.random()*actions.length)];
            b.style.left = (x - 40) + 'px'; b.style.top = (y - 40) + 'px';
            document.body.appendChild(b);
            setTimeout(()=> b.remove(), 300);

            window.speechSynthesis.cancel();
            let s = new SpeechSynthesisUtterance("STOP");
            s.pitch = 1.2 + (combo * 0.1);
            window.speechSynthesis.speak(s);
        }
    };

    window.addEventListener('mousedown', hit);
    window.addEventListener('touchstart', hit);
</script>
</body>
</html>
